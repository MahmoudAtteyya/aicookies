services:
  # ── Redis for Stream Buffer Storage ──
  redis:
    image: redis:7-alpine
    container_name: aicookies-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  aicookies:
    build: .
    container_name: aicookies
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - /opt/aicookies-data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - AUTH_USERNAME=mahmoud
      - AUTH_PASSWORD=Mmm12011305
      - PROXY_API_KEY_HASH=39ed4e7fecce75348ef79a2a2fa89dff3e1971022ae405a82d1e79d7b94215be
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      # IPRoyal Residential Proxy (disabled - account suspended)
      # - PROXY_ENABLED=false
      # - PROXY_USER=7MbCthZqPB0y1E1T
      # - PROXY_PASS=sTj24Oqhz2RPrIM8
      # - PROXY_HOST=geo.iproyal.com
      # - PROXY_PORT=12321
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # --- Main router ---
      - "traefik.http.routers.aicookies.rule=Host(`aicookies.elliaa.com`)"
      - "traefik.http.routers.aicookies.entrypoints=websecure"
      - "traefik.http.routers.aicookies.tls.certresolver=letsencrypt"
      # --- API rate limit: 120 req/min per IP ---
      - "traefik.http.middlewares.aicookies-ratelimit.ratelimit.average=120"
      - "traefik.http.middlewares.aicookies-ratelimit.ratelimit.burst=30"
      - "traefik.http.routers.aicookies.middlewares=aicookies-ratelimit,aicookies-secheaders@docker"
      # --- Security headers (allow API from any origin) ---
      - "traefik.http.middlewares.aicookies-secheaders.headers.accesscontrolallowmethods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.aicookies-secheaders.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Requested-With"
      - "traefik.http.middlewares.aicookies-secheaders.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.aicookies-secheaders.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.aicookies-secheaders.headers.browserxssfilter=true"
      - "traefik.http.middlewares.aicookies-secheaders.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.aicookies-secheaders.headers.customresponseheaders.X-API-Proxy=AI-Cookies-Gateway"
      - "traefik.http.services.aicookies.loadbalancer.server.port=5050"
      - "traefik.docker.network=dokploy-network"

volumes:
  redis-data:

networks:
  dokploy-network:
    external: true
