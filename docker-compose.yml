services:
  aicookies:
    build: .
    container_name: aicookies
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - cookie_data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - AUTH_USERNAME=mahmoud
      - AUTH_PASSWORD=Mmm12011305
      - PROXY_API_KEY_HASH=39ed4e7fecce75348ef79a2a2fa89dff3e1971022ae405a82d1e79d7b94215be
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      # Bright Data Residential Proxy (optional — set PROXY_ENABLED=true to enable)
      - PROXY_ENABLED=false
      - BRD_CUSTOMER_ID=
      - BRD_ZONE=
      - BRD_PASSWORD=
      - BRD_PROXY_HOST=brd.superproxy.io
      - BRD_PROXY_PORT=33335
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aicookies.rule=Host(`aicookies.elliaa.com`)"
      - "traefik.http.routers.aicookies.entrypoints=websecure"
      - "traefik.http.routers.aicookies.tls.certresolver=letsencrypt"
      - "traefik.http.services.aicookies.loadbalancer.server.port=5050"
      - "traefik.docker.network=dokploy-network"

volumes:
  cookie_data:

networks:
  dokploy-network:
    external: true
