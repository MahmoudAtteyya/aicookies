{% extends "base.html" %}
{% block title %}Login — AI Proxy Gateway{% endblock %}
{% block content %}

<div class="login-center">
    <div class="login-box login-premium">
        <div class="login-logo-wrap">
            <div class="login-logo">🍪</div>
        </div>
        <h1 class="login-title">AI Proxy Gateway</h1>
        <p class="login-subtitle">Sign in to manage your gateway</p>
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg login-submit">Sign In →</button>
        </form>
        <div class="login-footer">
            <span class="login-dot"></span> Secure connection
        </div>
    </div>
</div>

<style>
.login-premium {
    position: relative;
    overflow: hidden;
    animation: loginFloat 4s ease-in-out infinite;
}
.login-premium::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--accent), var(--blue), var(--accent));
    border-radius: var(--r-xl);
    z-index: -1;
    opacity: 0.6;
    animation: gradientShift 6s ease infinite;
    background-size: 300% 300%;
}
.login-logo-wrap {
    text-align: center;
    margin-bottom: 1.25rem;
}
.login-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    box-shadow: 0 8px 24px rgba(139,92,246,0.25);
    animation: logoPulse 3s ease-in-out infinite;
}
.login-title {
    text-align: center;
    margin: 0;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: -0.02em;
}
.login-subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin: 0.25rem 0 1.5rem;
}
.login-form .form-group { margin-bottom: 1.1rem; }
.login-submit {
    margin-top: 0.5rem;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
}
.login-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
}
.login-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: dotPulse 2s ease-in-out infinite;
}
@keyframes loginFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
}
@keyframes logoPulse {
    0%,100% { transform: scale(1); box-shadow: 0 8px 24px rgba(139,92,246,0.25); }
    50% { transform: scale(1.03); box-shadow: 0 12px 32px rgba(139,92,246,0.35); }
}
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
@keyframes dotPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
}
</style>
{% endblock %}
