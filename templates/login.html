<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Proxy Gateway — Secure login">
    <title>Login — AI Proxy Gateway</title>

    <!-- Vercel Geist font system -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════════════════════
           VERCEL LOGIN PAGE — Blue accent, pure black, white text
           ═══════════════════════════════════════════════════════════════════ */
        :root {
            /* ── Primary palette ── */
            --black:          #000000;
            --black-elevated: #0a0a0a;
            --white:          #ffffff;
            --gray-900:       #171717;
            --gray-500:       #666666;
            --gray-400:       #808080;

            /* ── Text ── */
            --text-primary:   var(--white);
            --text-secondary: #a0a0a0;
            --text-tertiary:  var(--gray-500);

            /* ── Accent (Vercel Blue) ── */
            --accent-primary: #0070f3;
            --accent-hover:   #1a7ff3;
            --accent-bg:      rgba(0,112,243,0.08);

            /* ── Shadows ── */
            --shadow-border:       rgba(255,255,255,0.08) 0px 0px 0px 1px;
            --shadow-border-hover: rgba(255,255,255,0.12) 0px 0px 0px 1px;
            --shadow-card:         var(--shadow-border), rgba(0,0,0,0.5) 0px 2px 4px;
            --shadow-lg:           var(--shadow-border), rgba(0,0,0,0.6) 0px 8px 32px;

            /* ── Focus ── */
            --focus-ring: 0 0 0 3px rgba(0,112,243,0.2);

            /* ── Fonts ── */
            --font-sans: 'Geist', system-ui, -apple-system, sans-serif;
            --font-mono: 'Geist Mono', ui-monospace, monospace;

            /* ── Transitions ── */
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base:  0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ═══════════════════════════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════════════════
           BACKGROUND (Gradient + Grid pattern + Blue orbs)
           ═══════════════════════════════════════════════════════════════════ */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,112,243,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0,112,243,0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0,112,243,0.03) 0%, transparent 50%);
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
        }

        /* Grid pattern overlay */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
            background-position: center;
            pointer-events: none;
            z-index: 1;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,112,243,0.1), transparent 70%);
            top: 10%;
            right: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,112,243,0.08), transparent 70%);
            bottom: 10%;
            left: 5%;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        /* ═══════════════════════════════════════════════════════════════════
           LOGIN CARD
           ═══════════════════════════════════════════════════════════════════ */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--black-elevated);
            box-shadow: var(--shadow-lg);
            border-radius: 12px;
            padding: 3rem 2.5rem;
            animation: slideUp var(--transition-base) ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════════════ */
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            animation: fadeIn 0.4s ease-out 0.1s backwards;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.64px;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9375rem;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ═══════════════════════════════════════════════════════════════════
           FORM
           ═══════════════════════════════════════════════════════════════════ */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            letter-spacing: 0;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: var(--font-sans);
            font-size: 0.9375rem;
            color: var(--text-primary);
            background: var(--black);
            border: none;
            box-shadow: var(--shadow-border);
            border-radius: 6px;
            outline: none;
            transition: box-shadow var(--transition-fast);
        }

        .form-input:hover {
            box-shadow: var(--shadow-border-hover);
        }

        .form-input:focus {
            box-shadow: var(--focus-ring), var(--shadow-border-hover);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
            opacity: 0.6;
        }

        .form-input[type="password"] {
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
        }

        /* ═══════════════════════════════════════════════════════════════════
           BUTTON
           ═══════════════════════════════════════════════════════════════════ */
        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--white);
            background: var(--accent-primary);
            border: none;
            box-shadow: var(--shadow-border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all var(--transition-fast);
        }

        .btn:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-border-hover), 0px 4px 12px rgba(0,112,243,0.2);
            transform: translateY(-1px);
        }

        .btn:focus {
            outline: none;
            box-shadow: var(--focus-ring), var(--shadow-border-hover);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-arrow {
            font-size: 1rem;
            transition: transform var(--transition-fast);
        }

        .btn:hover .btn-arrow {
            transform: translateX(2px);
        }

        /* ═══════════════════════════════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════════════════════════════ */
        .login-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            box-shadow: var(--shadow-border);
            text-align: center;
        }

        .login-footer-text {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        .login-footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-fast);
        }

        .login-footer-link:hover {
            color: var(--accent-primary);
        }

        /* ═══════════════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════════════ */
        @media (max-width: 640px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .logo {
                font-size: 2.5rem;
            }

            .login-title {
                font-size: 1.25rem;
            }

            body {
                padding: 1rem;
            }
        }

        /* ═══════════════════════════════════════════════════════════════════
           FLASH MESSAGE
           ═══════════════════════════════════════════════════════════════════ */
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideDown var(--transition-base) ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .flash.error {
            background: rgba(248,81,73,0.08);
            color: #f85149;
            box-shadow: rgba(248,81,73,0.2) 0px 0px 0px 1px;
        }

        .flash.success {
            background: rgba(48,161,78,0.08);
            color: #30a14e;
            box-shadow: rgba(48,161,78,0.2) 0px 0px 0px 1px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           LOADING STATE
           ═══════════════════════════════════════════════════════════════════ */
        .btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn.loading::after {
            content: '';
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="login-header">
            <span class="logo">🍪</span>
            <h1 class="login-title">AI Proxy Gateway</h1>
            <p class="login-subtitle">Unified access to 20+ AI models</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username" class="form-label">USERNAME</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input" 
                    placeholder="Enter your username"
                    required 
                    autocomplete="username"
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">PASSWORD</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    required 
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span>Sign In</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>

        <div class="login-footer">
            <p class="login-footer-text">
                Need help? <a href="/docs" class="login-footer-link" target="_blank">View Documentation</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.querySelector('form');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                e.preventDefault();
                submitBtn.classList.remove('loading');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.querySelector('span:first-child').textContent = 'Signing in...';
        });

        // Auto-focus username on load
        document.getElementById('username').focus();
    </script>
</body>
</html>
