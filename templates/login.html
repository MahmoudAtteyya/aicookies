{% extends "base.html" %}
{% block title %}Login — AI Proxy Gateway{% endblock %}
{% block content %}

<div class="login-center">
    <div class="login-box">
        <div style="text-align:center;margin-bottom:1.5rem;">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:1.75rem;margin-bottom:0.75rem;">🍪</div>
            <h1 style="margin:0;font-size:1.5rem;color:var(--accent);">AI Proxy Gateway</h1>
            <p style="color:var(--text-dim);font-size:0.85rem;margin-top:0.25rem;">Sign in to manage your gateway</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">Sign In →</button>
        </form>
    </div>
</div>

{% endblock %}
